services:
  app:
    image: quran-api
    container_name: quran-api
    build: .
    env_file:
      - .env
    ports:
      - "127.0.0.1:${PORT:-8080}:${PORT:-8080}"
    networks:
      - shared-net
    volumes:
      - quran-index:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8080}/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  shared-net:
    external: true

volumes:
  quran-index:
    driver: local
